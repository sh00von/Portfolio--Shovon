    <style>
        :root {
            --bg: #171717;
            --text: #EDEDED;
            --muted: #a1a1a1;
            --muted-2: #888;
            --muted-3: #555;
            --surface: #1c1c1c;
            --border: #2a2a2a;
            --border-hover: #444;
        }

        html.light {
            --bg: #f7f7f7;
            --text: #171717;
            --muted: #374151;
            --muted-2: #4b5563;
            --muted-3: #9ca3af;
            --surface: #ebebeb;
            --border: #d1d5db;
            --border-hover: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Mulish', ui-sans-serif, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            opacity: 0;
            visibility: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2e2e2e;
            border-radius: 4px;
        }

        /* ── Theme toggle ── */
        .theme-btn {
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
            transition: background 0.2s;
        }

        .theme-btn:hover {
            background: var(--surface);
        }

        /* ── Back link ── */
        .back-link {
            color: var(--muted-2);
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* ── Project row ── */
        .project-row {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            align-items: center;
            gap: 20px;
            padding: 28px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: background 0.2s;
        }

        .project-row:first-child {
            border-top: 1px solid var(--border);
        }

        .project-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted-3);
            letter-spacing: 0.08em;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }

        .project-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 6px;
            transition: color 0.2s;
        }

        .project-desc {
            font-size: 13px;
            color: var(--muted-2);
            line-height: 1.6;
            max-width: 480px;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .tag {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid var(--border);
            color: var(--muted-2);
            background: transparent;
        }

        /* Floating preview image */
        .project-preview {
            position: fixed;
            width: 240px;
            aspect-ratio: 16/10;
            border-radius: 8px;
            overflow: hidden;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: scale(0.92) rotate(-1deg);
            transition: opacity 0.25s ease, transform 0.25s ease;
            border: 1px solid #333;
        }

        .project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-preview.active {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Arrow icon */
        .project-arrow {
            color: var(--muted-3);
            transition: transform 0.25s ease, color 0.2s;
            flex-shrink: 0;
        }

        .project-row:hover .project-arrow {
            transform: translate(4px, -4px);
            color: var(--text);
        }

        .project-row:hover .project-title {
            color: var(--muted);
        }

        /* ── Filter pills ── */
        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 36px;
        }

        .pill {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--muted-2);
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            letter-spacing: 0.02em;
        }

        .pill:hover,
        .pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* ── Section label ── */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted-3);
            margin-bottom: 4px;
        }

        /* ── Stat pill ── */
        .stat-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted-2);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 12px;
            letter-spacing: 0.04em;
        }

        /* ── Mobile: hide preview ── */
        @media (max-width: 640px) {
            .project-preview {
                display: none;
            }

            .project-row {
                grid-template-columns: 36px 1fr auto;
                gap: 12px;
                padding: 22px 0;
            }

            .project-title {
                font-size: 15px;
            }
        }

        /* ── Lightbox ── */
        #lightbox {
            transition: opacity 0.3s ease;
        }

        #lightbox-img {
            transition: transform 0.3s ease;
        }

        /* light mode overrides */
        html.light .project-preview {
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
            border-color: #d1d5db;
        }
    </style>
</head>

    <script>
            (() => {
                // ── Theme ──
                const root = document.documentElement;
                const storageKey = "theme";
                const themeMeta = document.querySelector('meta[name="theme-color"]');

                const syncBtn = (btn, isLight) => {
                    if (!btn) return;
                    btn.querySelector('[data-theme-icon="sun"]')?.classList.toggle("hidden", !isLight);
                    btn.querySelector('[data-theme-icon="moon"]')?.classList.toggle("hidden", isLight);
                    btn.setAttribute("aria-pressed", String(isLight));
                };
                const applyTheme = (theme) => {
                    const isLight = theme === "light";
                    root.classList.toggle("light", isLight);
                    if (themeMeta) themeMeta.setAttribute("content", isLight ? "#f7f7f7" : "#171717");
                    syncBtn(document.getElementById("theme-toggle"), isLight);
                    syncBtn(document.getElementById("theme-toggle-mobile"), isLight);
                };
                applyTheme(localStorage.getItem(storageKey) === "light" ? "light" : "dark");
                const handleToggle = () => {
                    const next = root.classList.contains("light") ? "dark" : "light";
                    localStorage.setItem(storageKey, next);
                    applyTheme(next);
                };
                document.getElementById("theme-toggle")?.addEventListener("click", handleToggle);
                document.getElementById("theme-toggle-mobile")?.addEventListener("click", handleToggle);

                // ── Hamburger ──
                const menuBtn = document.getElementById("mobile-menu-btn");
                const mobileMenu = document.getElementById("mobile-menu");
                const bar1 = document.getElementById("bar1");
                const bar2 = document.getElementById("bar2");
                const bar3 = document.getElementById("bar3");
                let menuOpen = false;
                const openMenu = () => {
                    menuOpen = true;
                    mobileMenu.style.maxHeight = mobileMenu.scrollHeight + "px";
                    mobileMenu.style.opacity = "1";
                    menuBtn.setAttribute("aria-expanded", "true");
                    bar1.style.transform = "translateY(8px) rotate(45deg)";
                    bar2.style.opacity = "0";
                    bar3.style.transform = "translateY(-8px) rotate(-45deg)";
                };
                const closeMenu = () => {
                    menuOpen = false;
                    mobileMenu.style.maxHeight = "0";
                    mobileMenu.style.opacity = "0";
                    menuBtn.setAttribute("aria-expanded", "false");
                    bar1.style.transform = "";
                    bar2.style.opacity = "1";
                    bar3.style.transform = "";
                };
                menuBtn?.addEventListener("click", () => menuOpen ? closeMenu() : openMenu());
                document.querySelectorAll(".mobile-nav-link").forEach(l => l.addEventListener("click", closeMenu));
            })();

                    "description": "Official website for the Water Resources Research Organization at CUET, built with Next.js and MongoDB.",
                    "image": "",
                    "categories": ["Full Stack"],
                    "tags": ["Next.js", "MongoDB", "Organization"],
                    "link": "https://www.wrrocuet.org/"
                },
                {
                    "id": "freelance-grain-crm",
                    "num": "09",
                    "title": "Freelance Grain CRM",
                    "description": "Solo CRM tool for freelancers — manage clients, generate invoices, and track payments from one clean dashboard.",
                    "image": "",
                    "categories": ["Full Stack", "AI"],
                    "tags": ["Next.js", "CRM", "Invoice"],
                    "link": "https://freelance-grain-crm.vercel.app/"
                },
                {
                    "id": "nextjs-wordpress-starter",
                    "num": "10",
                    "title": "Next.js WordPress Starter",
                    "description": "An open-source starter template that connects Next.js with WordPress as a headless CMS for blazing-fast sites.",
                    "image": "",
                    "categories": ["WordPress", "Full Stack"],
                    "tags": ["Next.js", "WordPress", "Headless CMS"],
                    "link": "https://next-wordpress-starter-kappa.vercel.app/"
                }

            ];

            list.innerHTML = projects.map((p) => `
                <article class="project-row" 
                    data-categories="${p.categories.join(",")}" 
                    data-img="${p.image}" 
                    data-link="${p.link}"
                    tabindex="0"
                    role="link"
                    aria-label="View Project: ${p.title} (${p.categories.join(", ")})">
                    <span class="project-num" aria-hidden="true">${p.num}</span>
                    <div>
                        <h2 class="project-title">${p.title}</h2>
                        <p class="project-desc">${p.description}</p>
                        <div class="project-tags">
                            ${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}
                        </div>
                    </div>
                    <svg class="project-arrow w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M17 7H7M17 7v10"/>
                    </svg>
                </article>
            `).join("");

            // ── Attach row interactions ──
            const handleRowClick = (row) => {
                const img = row.dataset.img;
                const link = row.dataset.link;
                if (link) window.open(link, "_blank", "noopener,noreferrer");
                else if (img) openLightbox(img);
            };

            document.querySelectorAll(".project-row").forEach((row, i) => {
                const img = row.dataset.img;
                if (img) {
                    row.addEventListener("mouseenter", () => { previewImg.src = img; preview.classList.add("active"); });
                    row.addEventListener("mouseleave", () => { preview.classList.remove("active"); });
                }
                
                row.addEventListener("click", () => handleRowClick(row));
                row.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleRowClick(row);
                    }
                });

                gsap.from(row, {
                    scrollTrigger: { trigger: row, start: "top 92%" },
                    x: -12, opacity: 0, duration: 0.55, delay: i < 3 ? i * 0.05 : 0, ease: "power2.out"
                });
            });

            // ── Filters ──
            const pills = document.querySelectorAll(".pill");
            pills.forEach(pill => {
                pill.addEventListener("click", () => {
                    pills.forEach(p => p.classList.remove("active"));
                    pill.classList.add("active");
                    const filter = pill.dataset.filter;
                    document.querySelectorAll(".project-row").forEach(row => {
                        const cats = row.dataset.categories || "";
                        row.style.display = (filter === "all" || cats.includes(filter)) ? "grid" : "none";
                    });
                });
            });
        });
    </script>
</body>
